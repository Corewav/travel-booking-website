<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelDemo - Payment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light fixed-top shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="index.html">🗺️ TravelDemo</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="hotels.html">Hotels</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Loader -->
    <div id="loader" class="loader-wrapper"><div class="spinner"></div></div>

    <div class="container page-container">
        <div class="row w-100 justify-content-center">
            <div class="col-lg-6 form-container">
                <h3 class="mb-4 text-center">Secure Payment</h3>
                
                <div class="alert alert-info text-center">
                    <p class="mb-1">Amount to pay:</p>
                    <h3 class="mb-0 text-dark" id="displayPrice">₹0</h3>
                    <small>Booking Ref: <span id="displayBookingId" class="fw-bold">...</span></small>
                </div>

                <!-- Fake Payment Form -->
                <form id="paymentForm">
                    <div class="mb-3 mt-4">
                        <label class="form-label">Cardholder Name</label>
                        <input type="text" class="form-control" required placeholder="Name on card">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Card Number (Dummy)</label>
                        <input type="text" class="form-control" id="cardNumber" required placeholder="XXXX XXXX XXXX XXXX" minlength="12">
                        <div class="form-text">For demo purposes, enter any 12+ digit number.</div>
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">Expiry Date</label>
                            <input type="text" class="form-control" id="expiry" required placeholder="MM/YY">
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">CVV</label>
                            <input type="password" class="form-control" id="cvv" required placeholder="XXX" maxlength="4">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-success w-100 mt-4 btn-lg">Pay Now</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const bookingId = sessionStorage.getItem('bookingId');
            const price = sessionStorage.getItem('totalPrice');

            if(!bookingId) {
                alert("No active booking found to pay.");
                window.location.href = "index.html";
                return;
            }

            document.getElementById('displayBookingId').textContent = bookingId;
            document.getElementById('displayPrice').textContent = `₹${price}`;

            document.getElementById('paymentForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                showLoader();

                const payload = {
                    booking_id: bookingId,
                    card_number: document.getElementById('cardNumber').value,
                    expiry: document.getElementById('expiry').value,
                    cvv: document.getElementById('cvv').value
                };

                try {
                    const res = await fetch('/api/payment', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    const data = await res.json();
                    if(data.success) {
                        window.location.href = "confirmation.html";
                    } else {
                        alert("Payment Error: " + data.error);
                    }
                } catch(e) {
                    alert("Network error.");
                } finally {
                    hideLoader();
                }
            });
        });
    </script>
</body>
</html>
