<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login & Signup - Travel Booking</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .container {
        background: white;
        border-radius: 10px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        width: 100%;
        max-width: 400px;
        padding: 40px;
      }

      h1 {
        color: #333;
        margin-bottom: 10px;
        font-size: 24px;
        text-align: center;
      }

      .form-title {
        text-align: center;
        font-size: 20px;
        font-weight: bold;
        color: #333;
        margin-bottom: 20px;
      }

      .toggle-form {
        text-align: center;
        margin-bottom: 30px;
        color: #666;
        font-size: 14px;
      }

      .toggle-form button {
        background: none;
        border: none;
        color: #667eea;
        cursor: pointer;
        font-weight: bold;
        text-decoration: underline;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: #333;
        font-weight: 500;
      }

      input[type="text"],
      input[type="email"],
      input[type="password"] {
        width: 100%;
        padding: 12px;
        border: 2px solid #e0e0e0;
        border-radius: 5px;
        font-size: 14px;
        transition: border-color 0.3s;
      }

      input[type="text"]:focus,
      input[type="email"]:focus,
      input[type="password"]:focus {
        outline: none;
        border-color: #667eea;
      }

      button[type="submit"] {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: transform 0.2s;
      }

      button[type="submit"]:hover {
        transform: translateY(-2px);
      }

      .error {
        color: #e74c3c;
        font-size: 13px;
        margin-top: 5px;
      }

      .success {
        color: #27ae60;
        font-size: 13px;
        margin-top: 5px;
      }

      .message {
        padding: 12px;
        border-radius: 5px;
        margin-bottom: 20px;
        text-align: center;
      }

      .message.error {
        background: #fadbd8;
        color: #c0392b;
      }

      .message.success {
        background: #d5f4e6;
        color: #27ae60;
      }

      #signupForm {
        display: none;
      }

      .back-link {
        text-align: center;
        margin-top: 20px;
      }

      .back-link a {
        color: #667eea;
        text-decoration: none;
        font-size: 14px;
      }

      .back-link a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Form Selector Tabs -->
      <div
        style="
          display: flex;
          gap: 10px;
          margin-bottom: 30px;
          border-bottom: 2px solid #e0e0e0;
        "
      >
        <button
          type="button"
          class="tab-btn active"
          id="loginTab"
          onclick="showLogin()"
          style="
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            border-bottom: 3px solid #667eea;
            color: #667eea;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
          "
        >
          Login
        </button>
        <button
          type="button"
          class="tab-btn"
          id="signupTab"
          onclick="showSignup()"
          style="
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            color: #999;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
          "
        >
          Sign Up
        </button>
      </div>

      <!-- Login Form -->
      <div id="loginForm">
        <div class="form-title">🔐 Login to Your Account</div>
        <div id="loginMessage"></div>
        <form onsubmit="handleLogin(event)">
          <div class="form-group">
            <label>Email</label>
            <input
              type="email"
              id="loginEmail"
              placeholder="Enter your email"
              required
            />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input
              type="password"
              id="loginPassword"
              placeholder="Enter your password"
              required
            />
          </div>
          <button type="submit" style="margin-bottom: 15px">Login Now</button>
        </form>
        <div style="text-align: center; color: #666; font-size: 14px">
          Don't have an account?
          <button
            type="button"
            onclick="showSignup()"
            style="
              background: none;
              border: none;
              color: #667eea;
              cursor: pointer;
              text-decoration: underline;
              font-weight: bold;
            "
          >
            Sign Up Here →
          </button>
        </div>
      </div>

      <!-- Signup Form -->
      <div id="signupForm" style="display: none">
        <div class="form-title">✨ Create Your Account</div>
        <div id="signupMessage"></div>
        <form onsubmit="handleSignup(event)">
          <div class="form-group">
            <label>Full Name</label>
            <input
              type="text"
              id="signupName"
              placeholder="Enter your full name"
              required
            />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input
              type="email"
              id="signupEmail"
              placeholder="Enter your email"
              required
            />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input
              type="password"
              id="signupPassword"
              placeholder="Enter password (min 6 characters)"
              required
            />
          </div>
          <button type="submit" style="margin-bottom: 15px">
            Create Account
          </button>
        </form>
        <div style="text-align: center; color: #666; font-size: 14px">
          Already have an account?
          <button
            type="button"
            onclick="showLogin()"
            style="
              background: none;
              border: none;
              color: #667eea;
              cursor: pointer;
              text-decoration: underline;
              font-weight: bold;
            "
          >
            Login Here →
          </button>
        </div>
      </div>

      <div class="back-link">
        <a href="index.html">← Back to Home</a>
      </div>
    </div>

    <script>
      function showLogin() {
        document.getElementById("loginForm").style.display = "block";
        document.getElementById("signupForm").style.display = "none";
        document.getElementById("loginTab").style.borderBottomColor = "#667eea";
        document.getElementById("loginTab").style.color = "#667eea";
        document.getElementById("signupTab").style.borderBottomColor =
          "transparent";
        document.getElementById("signupTab").style.color = "#999";
      }

      function showSignup() {
        document.getElementById("loginForm").style.display = "none";
        document.getElementById("signupForm").style.display = "block";
        document.getElementById("loginTab").style.borderBottomColor =
          "transparent";
        document.getElementById("loginTab").style.color = "#999";
        document.getElementById("signupTab").style.borderBottomColor =
          "#667eea";
        document.getElementById("signupTab").style.color = "#667eea";
      }

      function toggleForm() {
        if (document.getElementById("loginForm").style.display !== "none") {
          showSignup();
        } else {
          showLogin();
        }
      }

      function showMessage(elementId, message, type) {
        const element = document.getElementById(elementId);
        element.innerHTML = `<div class="message ${type}">${message}</div>`;
      }

      async function handleLogin(event) {
        event.preventDefault();
        const email = document.getElementById("loginEmail").value;
        const password = document.getElementById("loginPassword").value;

        try {
          const response = await fetch("/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });

          const data = await response.json();

          if (data.success) {
            localStorage.setItem("token", data.token);
            localStorage.setItem("userId", data.userId);
            localStorage.setItem("userName", data.name);
            showMessage(
              "loginMessage",
              "✅ Login successful! Redirecting to dashboard...",
              "success",
            );
            setTimeout(() => (window.location.href = "dashboard.html"), 1500);
          } else {
            showMessage(
              "loginMessage",
              "❌ " + (data.error || "Login failed"),
              "error",
            );
          }
        } catch (error) {
          showMessage("loginMessage", "❌ Error: " + error.message, "error");
        }
      }

      async function handleSignup(event) {
        event.preventDefault();
        const name = document.getElementById("signupName").value;
        const email = document.getElementById("signupEmail").value;
        const password = document.getElementById("signupPassword").value;

        // Client-side validation
        if (name.trim().length < 2) {
          showMessage(
            "signupMessage",
            "❌ Name must be at least 2 characters",
            "error",
          );
          return;
        }

        if (password.length < 6) {
          showMessage(
            "signupMessage",
            "❌ Password must be at least 6 characters",
            "error",
          );
          return;
        }

        try {
          console.log("Sending signup request...", { name, email, password });

          const response = await fetch("/api/auth/signup", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, email, password }),
          });

          const data = await response.json();
          console.log("Signup response:", data);

          if (data.success) {
            localStorage.setItem("token", data.token);
            localStorage.setItem("userId", data.userId);
            localStorage.setItem("userName", name);
            showMessage(
              "signupMessage",
              "✅ Account created successfully! Redirecting to dashboard...",
              "success",
            );
            setTimeout(() => (window.location.href = "dashboard.html"), 1500);
          } else {
            showMessage(
              "signupMessage",
              "❌ " + (data.error || "Signup failed"),
              "error",
            );
          }
        } catch (error) {
          console.error("Signup error:", error);
          showMessage("signupMessage", "❌ Error: " + error.message, "error");
        }
      }

      // Check if already logged in
      if (localStorage.getItem("token")) {
        window.location.href = "dashboard.html";
      }
    </script>
  </body>
</html>
