<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TravelDemo - Find Your Perfect Stay</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="style.css" rel="stylesheet" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light fixed-top">
      <div class="container">
        <a class="navbar-brand" href="index.html">🗺️ TravelDemo</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="hotels.html">Hotels</a>
            </li>
            <li class="nav-item" id="authNav">
              <a
                class="nav-link btn btn-primary text-white ms-2"
                href="auth.html"
                >Login</a
              >
            </li>
            <li class="nav-item" id="dashboardNav" style="display: none">
              <a
                class="nav-link btn btn-primary text-white ms-2"
                href="dashboard.html"
                >Dashboard</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Hero Section -->
    <header class="hero-section">
      <div class="container">
        <div class="glass-card mx-auto">
          <h1>Discover Your Next Adventure</h1>
          <p>Book hotels easily with the best prices guaranteed.</p>

          <form id="searchForm" class="search-form text-start">
            <div class="form-group">
              <label class="form-label text-white">Location / Hotel</label>
              <input
                type="text"
                id="location"
                class="form-control"
                placeholder="Where to? (e.g. Dubai, Goa)"
              />
            </div>
            <div class="form-group">
              <label class="form-label text-white">Check-in</label>
              <input type="date" id="checkin" class="form-control" required />
            </div>
            <div class="form-group">
              <label class="form-label text-white">Check-out</label>
              <input type="date" id="checkout" class="form-control" required />
            </div>
            <div class="form-group">
              <label class="form-label text-white">Guests</label>
              <select id="guests" class="form-select">
                <option value="1">1 Person</option>
                <option value="2" selected>2 People</option>
                <option value="3">3 People</option>
                <option value="4">4+ People</option>
              </select>
            </div>
            <div class="form-group">
              <button type="submit" class="btn btn-primary w-100">
                Search
              </button>
            </div>
          </form>
        </div>
      </div>
    </header>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
    <script>
      // Check if user is logged in and update navbar
      function updateNavbar() {
        const token = localStorage.getItem("token");
        if (token) {
          document.getElementById("authNav").style.display = "none";
          document.getElementById("dashboardNav").style.display = "block";
        } else {
          document.getElementById("authNav").style.display = "block";
          document.getElementById("dashboardNav").style.display = "none";
        }
      }

      updateNavbar();

      document.getElementById("searchForm").addEventListener("submit", (e) => {
        e.preventDefault();
        const location = document.getElementById("location").value;
        const checkin = document.getElementById("checkin").value;
        const checkout = document.getElementById("checkout").value;
        const guests = document.getElementById("guests").value;

        // Basic check-in check-out validation
        if (new Date(checkin) >= new Date(checkout)) {
          alert("Check-out date must be after check-in date");
          return;
        }

        // Save search params to localStorage to use across pages
        localStorage.setItem(
          "searchData",
          JSON.stringify({
            location,
            checkin,
            checkout,
            guests,
          }),
        );

        window.location.href = `hotels.html?search=${encodeURIComponent(location)}`;
      });

      // Pre-fill dates to today and tomorrow
      const today = new Date();
      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);

      document.getElementById("checkin").valueAsDate = today;
      document.getElementById("checkout").valueAsDate = tomorrow;
    </script>
  </body>
</html>
