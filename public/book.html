<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TravelDemo - Secure Booking</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="style.css" rel="stylesheet" />
  </head>
  <body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light fixed-top shadow-sm">
      <div class="container">
        <a class="navbar-brand" href="index.html">🗺️ TravelDemo</a>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="hotels.html">Hotels</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Loader -->
    <div id="loader" class="loader-wrapper"><div class="spinner"></div></div>

    <div class="container page-container">
      <div class="row w-100 justify-content-center">
        <div class="col-lg-8 form-container">
          <h3 class="mb-4">Complete your Booking</h3>

          <div class="card mb-4 border-0 bg-light p-3">
            <h5 id="hotelName" class="text-primary mb-1">Hotel Name</h5>
            <p class="mb-0 text-muted" id="hotelLocation">Location</p>
          </div>

          <form id="bookingForm">
            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label">Check-in Date</label>
                <input type="date" class="form-control" id="checkin" required />
              </div>
              <div class="col-md-6">
                <label class="form-label">Check-out Date</label>
                <input
                  type="date"
                  class="form-control"
                  id="checkout"
                  required
                />
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Number of Guests</label>
              <select id="guests" class="form-select">
                <option value="1">1 Person</option>
                <option value="2" selected>2 People</option>
                <option value="3">3 People</option>
                <option value="4">4+ People</option>
              </select>
            </div>

            <hr class="my-4" />
            <h5 class="mb-3">Guest Details</h5>
            <div class="mb-3">
              <label class="form-label">Full Name</label>
              <input
                type="text"
                class="form-control"
                id="name"
                required
                placeholder="John Doe"
              />
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Email Address</label>
                <input
                  type="email"
                  class="form-control"
                  id="email"
                  required
                  placeholder="john@example.com"
                />
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Phone Number</label>
                <input
                  type="tel"
                  class="form-control"
                  id="phone"
                  required
                  placeholder="+91 XXXXX XXXXX"
                />
              </div>
            </div>

            <div class="alert alert-secondary mt-4">
              <div class="d-flex justify-content-between align-items-center">
                <strong>Total Price:</strong>
                <span class="fs-4 price" id="totalPrice">₹0</span>
              </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 mt-3 btn-lg">
              Proceed to Payment
            </button>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const hotel = JSON.parse(sessionStorage.getItem("selectedHotel"));
        if (!hotel) {
          alert("No hotel selected!");
          window.location.href = "index.html";
          return;
        }

        document.getElementById("hotelName").textContent = hotel.name;
        document.getElementById("hotelLocation").textContent =
          `📍 ${hotel.location}`;

        // Auto-fill dates if available
        const searchDataStr = localStorage.getItem("searchData");
        if (searchDataStr) {
          const searchData = JSON.parse(searchDataStr);
          document.getElementById("checkin").value = searchData.checkin;
          document.getElementById("checkout").value = searchData.checkout;
          document.getElementById("guests").value = searchData.guests;
        } else {
          // Default today and tomorrow
          const today = new Date();
          const tomorrow = new Date();
          tomorrow.setDate(tomorrow.getDate() + 1);
          document.getElementById("checkin").valueAsDate = today;
          document.getElementById("checkout").valueAsDate = tomorrow;
        }

        calculateTotal();

        document
          .getElementById("checkin")
          .addEventListener("change", calculateTotal);
        document
          .getElementById("checkout")
          .addEventListener("change", calculateTotal);

        // Handle submission
        document
          .getElementById("bookingForm")
          .addEventListener("submit", async (e) => {
            e.preventDefault();
            showLoader();

            const payload = {
              name: document.getElementById("name").value,
              email: document.getElementById("email").value,
              phone: document.getElementById("phone").value,
              hotel_id: hotel.id,
              hotel_name: hotel.name,
              check_in: document.getElementById("checkin").value,
              check_out: document.getElementById("checkout").value,
              guests: document.getElementById("guests").value,
              price: currentTotalPrice,
            };

            try {
              const res = await fetch("/api/bookings", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload),
              });

              const data = await res.json();
              if (data.success) {
                // Store booking ID and price in session for payment page
                sessionStorage.setItem("bookingId", data.bookingId);
                sessionStorage.setItem("totalPrice", data.total_price);
                window.location.href = "payment.html";
              } else {
                alert("Error: " + data.error);
              }
            } catch (e) {
              alert("Network error.");
            } finally {
              hideLoader();
            }
          });
      });

      let currentTotalPrice = 0;
      function calculateTotal() {
        const hotel = JSON.parse(sessionStorage.getItem("selectedHotel"));
        const checkin = new Date(document.getElementById("checkin").value);
        const checkout = new Date(document.getElementById("checkout").value);

        if (checkin && checkout && checkout > checkin) {
          const diffTime = Math.abs(checkout - checkin);
          const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
          currentTotalPrice = diffDays * hotel.price;
          document.getElementById("totalPrice").textContent =
            `₹${currentTotalPrice}`;
        } else {
          currentTotalPrice = hotel.price;
          document.getElementById("totalPrice").textContent =
            `₹${currentTotalPrice}`;
        }
      }
    </script>
  </body>
</html>
