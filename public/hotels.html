<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TravelDemo - Search Results</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="style.css" rel="stylesheet" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light fixed-top shadow-sm">
      <div class="container">
        <a class="navbar-brand" href="index.html">🗺️ TravelDemo</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="hotels.html">Hotels</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Loader -->
    <div id="loader" class="loader-wrapper"><div class="spinner"></div></div>

    <div class="container page-container">
      <h2 class="mb-4" id="resultsTitle">Available Hotels</h2>

      <div class="row" id="hotelList">
        <!-- Results will be injected here via JS -->
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const query = urlParams.get("search") || "";

        if (query) {
          document.getElementById("resultsTitle").textContent =
            `Search results for "${query}"`;
        }

        showLoader();
        try {
          const response = await fetch(
            `/api/hotels/search?location=${encodeURIComponent(query)}`,
          );
          const data = await response.json();
          const hotels = data.hotels || [];

          const listContainer = document.getElementById("hotelList");
          listContainer.innerHTML = "";

          if (hotels.length === 0) {
            listContainer.innerHTML = `<div class="col-12"><div class="alert alert-info">No hotels found matching your search. Please try a different location.</div></div>`;
          } else {
            hotels.forEach((hotel) => {
              listContainer.innerHTML += `
                            <div class="col-md-4 mb-4">
                                <div class="card hotel-card h-100">
                                    <img src="${hotel.image}" class="hotel-img card-img-top" alt="${hotel.name}">
                                    <div class="card-body d-flex flex-column">
                                        <div class="d-flex justify-content-between align-items-center mb-2">
                                            <h5 class="card-title mb-0">${hotel.name}</h5>
                                            <span class="rating">⭐ ${hotel.rating}</span>
                                        </div>
                                        <p class="text-muted"><small>📍 ${hotel.location}</small></p>
                                        <p class="price mt-auto mb-3">₹${hotel.price} <small class="text-muted fs-6 fw-normal">/ night</small></p>
                                        <a href="hotel.html?id=${hotel.id}" class="btn btn-outline-primary w-100">View Details</a>
                                    </div>
                                </div>
                            </div>
                        `;
            });
          }
        } catch (error) {
          console.error("Error fetching hotels", error);
          document.getElementById("hotelList").innerHTML =
            `<div class="alert alert-danger">Error loading data. Please try again.</div>`;
        } finally {
          hideLoader();
        }
      });
    </script>
  </body>
</html>
