<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelDemo - Booking Confirmed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light fixed-top shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="index.html">🗺️ TravelDemo</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="hotels.html">Hotels</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container page-container d-flex align-items-center justify-content-center" style="min-height: 80vh;">
        <div class="form-container text-center px-5 py-5" style="max-width: 600px; width:100%;">
            <div class="success-icon">✓</div>
            <h2 class="text-dark mb-3">Booking Confirmed!</h2>
            <p class="text-muted mb-4">Your payment was successful and your booking is secure.</p>
            
            <div class="card bg-light border-0 p-4 mb-4 text-start">
                <h5 class="mb-3 text-primary border-bottom pb-2">Booking Summary</h5>
                <div class="d-flex justify-content-between mb-2">
                    <span class="text-muted">Booking ID:</span>
                    <strong id="confBookingId" class="text-dark">...</strong>
                </div>
                <div class="d-flex justify-content-between mb-2">
                    <span class="text-muted">Hotel:</span>
                    <strong id="confHotelName" class="text-dark">...</strong>
                </div>
                <div class="d-flex justify-content-between mb-2">
                    <span class="text-muted">Amount Paid:</span>
                    <strong id="confPrice" class="text-success">...</strong>
                </div>
            </div>

            <a href="index.html" class="btn btn-outline-primary px-4">Return to Home</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const bookingId = sessionStorage.getItem('bookingId');
            const price = sessionStorage.getItem('totalPrice');
            const hotelStr = sessionStorage.getItem('selectedHotel');
            
            if(!bookingId) {
                window.location.href = "index.html";
                return;
            }

            document.getElementById('confBookingId').textContent = bookingId;
            document.getElementById('confPrice').textContent = `₹${price}`;
            
            if(hotelStr) {
                const hotel = JSON.parse(hotelStr);
                document.getElementById('confHotelName').textContent = hotel.name;
            } else {
                document.getElementById('confHotelName').textContent = "Selected Hotel";
            }

            // Clear session to prevent duplicate/accidental resubmissions on navigate back
            sessionStorage.removeItem('bookingId');
            sessionStorage.removeItem('totalPrice');
            sessionStorage.removeItem('selectedHotel');
            // Keep searchData in localStorage for future searches
        });
    </script>
</body>
</html>
